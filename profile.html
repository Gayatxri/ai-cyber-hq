<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AI Cyber HQ</title>

    <link rel="stylesheet" href="assets/styles.css">

    <style>
        .profile-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
        }

        .member-list {
            border-right: 1px solid var(--cy-border);
            padding-right: 1rem;
        }

        .member-item {
            padding: .6rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
        }

        .member-item:hover {
            color: var(--cy-primary);
        }

        .profile-card {
            padding: 2rem;
            border: 1px solid var(--cy-border);
        }

        .skills span {
            padding: .3rem .6rem;
            border: 1px solid var(--cy-border);
            margin-right: .5rem;
            display: inline-block;
            margin-top: .5rem;
        }
    </style>

</head>

<body>
<div id="three-bg"></div>
    <nav class="cyber-nav">
        <a href="index.html" class="cyber-nav-brand">⚡ AICYBERHQ</a>

        <ul class="cyber-nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="leaderboard.html">Leaderboard</a></li>
            <li><a href="profile.html" class="active">Profiles</a></li>
        </ul>
    </nav>

    <main class="cyber-main">

        <h1 class="cyber-font">Member Profiles</h1>

        <div class="profile-container">

            <div class="member-list" id="memberList"></div>

            <div class="profile-card">

                <h2 id="pName"></h2>
                <p id="pBio"></p>

                <h3>Skills</h3>
                <div class="skills" id="pSkills"></div>

                <p><strong>Points:</strong> <span id="pPoints"></span></p>
                <p><strong>Badge:</strong> <span id="pBadge"></span></p>

                <br>

                <a id="pGithub" target="_blank">GitHub</a> |
                <a id="pLinkedin" target="_blank">LinkedIn</a>

            </div>

        </div>

    </main>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="assets/three-bg.js"></script>
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
</body>


</html>
